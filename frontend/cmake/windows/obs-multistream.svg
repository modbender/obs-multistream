<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="c1plate" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0d141d"/>
    </radialGradient>
    <linearGradient id="c1accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39e0d0"/>
      <stop offset="100%" stop-color="#17b3c9"/>
    </linearGradient>
  </defs>

  <!-- hard-edged dark plate -->
  <rect x="0" y="0" width="256" height="256" rx="0" fill="url(#c1plate)"/>

  <!-- three broadcast beams: wide near the core, fanning to three endpoints -->
  <g stroke-linecap="round">
    <!-- beam up-left -->
    <path d="M128 128 L58 56" stroke="url(#c1accent)" stroke-width="16" opacity="0.95"/>
    <!-- beam up-right -->
    <path d="M128 128 L198 56" stroke="url(#c1accent)" stroke-width="16" opacity="0.95"/>
    <!-- beam down -->
    <path d="M128 128 L128 212" stroke="url(#c1accent)" stroke-width="16" opacity="0.95"/>
  </g>

  <!-- endpoint destination nodes -->
  <g fill="url(#c1accent)" stroke="#0d141d" stroke-width="6">
    <circle cx="58" cy="56" r="22"/>
    <circle cx="198" cy="56" r="22"/>
    <circle cx="128" cy="212" r="22"/>
  </g>

  <!-- aperture core: dark ring with bright record center -->
  <circle cx="128" cy="128" r="46" fill="#0d141d"/>
  <circle cx="128" cy="128" r="46" fill="none" stroke="url(#c1accent)" stroke-width="9"/>
  <circle cx="128" cy="128" r="20" fill="url(#c1accent)"/>
</svg>
